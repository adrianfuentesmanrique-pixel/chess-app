<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1714">
<title>Chess Training Center</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="splash">
  <img src="icons/logo-mark.png" alt="" id="splash-logo">
  <div id="splash-title">Chess Training Center</div>
</div>

<header id="topbar">
  <span id="app-title"><img src="icons/logo-mark.png" class="brand-logo" alt="">Chess Training Center</span>
  <div class="row" style="gap:10px; margin:0;">
    <span id="streak-badge" class="streak-badge" title="Racha diaria"></span>
    <button id="btn-settings" class="icon-btn" title="Ajustes">⚙️</button>
  </div>
</header>

<main>
  <!-- ══════════ ANALYSIS ══════════ -->
  <section id="screen-analysis" class="screen">
    <div id="ana-gr-nav" class="row hidden" style="margin:0 0 6px;">
      <button id="ana-gr-exit" class="btn small" data-i18n="exit_game"></button>
    </div>
    <div id="ana-base-nav" class="row wrap hidden" style="justify-content:space-between; margin:0 0 6px;">
      <div class="row" style="margin:0; gap:4px;">
        <button id="ana-base-back" class="btn small">← <span data-i18n="back_to_base"></span></button>
        <button id="ana-base-exit" class="btn small" data-i18n="exit_base"></button>
      </div>
      <div class="row" style="margin:0; gap:4px;">
        <button id="ana-base-prev" class="btn small">◀</button>
        <button id="ana-base-next" class="btn small">▶</button>
      </div>
    </div>
    <div class="row" style="justify-content:flex-end; gap:6px; margin:0 0 6px;">
      <button id="ana-undo-btn" class="tool-btn" style="flex:0 0 auto; width:auto; padding:8px 14px;" data-i18n-aria="undo_annotation">↩️</button>
      <button id="ana-new-game-btn" class="tool-btn" style="flex:0 0 auto; width:auto; padding:8px 14px;" data-i18n-aria="new_game">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
          <rect x="10.5" y="1" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
          <rect x="1" y="10.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="17.5" cy="17.5" r="6" fill="var(--accent)"/>
          <path d="M17.5 14.7v5.6M14.7 17.5h5.6" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="ana-setup-btn" class="tool-btn" style="flex:0 0 auto; width:auto; padding:8px 14px;" data-i18n-aria="setup_position">✏️</button>
    </div>
    <div id="ana-board" class="board-wrap"></div>
    <div id="ana-engine" class="engine-panel hidden">
      <div class="engine-lines" id="ana-engine-lines"></div>
    </div>
    <div id="ana-toolbar" class="toolbar">
      <button id="ana-first" class="tool-btn">⏮</button>
      <button id="ana-prev" class="tool-btn">◀</button>
      <button id="ana-next" class="tool-btn">▶</button>
      <button id="ana-last" class="tool-btn">⏭</button>
      <button id="ana-engine-toggle" class="tool-btn">🖥️</button>
      <button id="ana-explore" class="tool-btn">🔎</button>
      <button id="ana-annotate-toggle" class="tool-btn">🎨</button>
      <button id="ana-flip" class="tool-btn">🔄</button>
      <button id="ana-more" class="tool-btn">⋯</button>
    </div>
    <div id="ana-annotate" class="annotate-bar hidden">
      <button data-color="green" class="annotate-btn green"></button>
      <button data-color="yellow" class="annotate-btn yellow"></button>
      <button data-color="red" class="annotate-btn red"></button>
      <button id="ana-annotate-clear" class="annotate-btn clear">🧹</button>
    </div>
    <div class="seg" id="ana-view-tab">
      <button data-v="moves" class="on" data-i18n="moves_tab"></button>
      <button data-v="games" data-i18n="games_tab"></button>
    </div>
    <div id="ana-moves" class="movelist"></div>
    <div id="ana-nag-bar" class="nag-bar">
      <button data-nag="3">!!</button>
      <button data-nag="1">!</button>
      <button data-nag="5">!?</button>
      <button data-nag="6">?!</button>
      <button data-nag="2">?</button>
      <button data-nag="4">??</button>
      <button data-nag="18">+-</button>
      <button data-nag="16">±</button>
      <button data-nag="14">⩲</button>
      <button data-nag="10">=</button>
      <button data-nag="13">∞</button>
      <button data-nag="15">⩱</button>
      <button data-nag="17">∓</button>
      <button data-nag="19">-+</button>
      <button data-nag="132">⇄</button>
    </div>
    <div id="ana-games-view" class="hidden">
      <div id="ana-games-status" class="hint"></div>
      <div id="ana-games-list" class="list"></div>
    </div>
    <div id="ana-comment-box" class="comment-box hidden">
      <textarea id="ana-comment-text" rows="3" data-i18n-ph="comment_hint"></textarea>
      <div class="row">
        <button id="ana-comment-save" class="btn primary" data-i18n="save"></button>
        <button id="ana-comment-cancel" class="btn" data-i18n="cancel"></button>
      </div>
    </div>
  </section>

  <!-- ══════════ DATABASE ══════════ -->
  <section id="screen-base" class="screen hidden">
    <div id="base-list-view">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <div class="row screen-head">
        <h2 data-i18n="tab_base"></h2>
        <button id="base-new" class="btn primary" data-i18n="new_base"></button>
      </div>
      <div id="base-list" class="list"></div>
      <p class="hint" data-i18n="cbh_note"></p>
    </div>
    <div id="base-games-view" class="hidden">
      <div class="row screen-head">
        <button id="base-back" class="btn" data-i18n="back"></button>
        <h2 id="base-games-title"></h2>
      </div>
      <div class="row wrap" id="base-actions">
        <button id="base-import" class="btn" data-i18n="import_pgn"></button>
        <button id="base-newgame" class="btn" data-i18n="new_game"></button>
        <button id="base-share" class="btn" data-i18n="export_base"></button>
        <button id="base-rename" class="btn" data-i18n="rename"></button>
        <button id="base-delete" class="btn danger" data-i18n="delete_base"></button>
      </div>
      <input type="text" id="game-search" class="input" data-i18n-ph="search">
      <div id="game-list" class="list"></div>
      <input type="file" id="pgn-file" accept=".pgn,.txt,application/x-chess-pgn,text/plain" hidden>
    </div>
  </section>

  <!-- ══════════ PLAY ══════════ -->
  <section id="screen-play" class="screen hidden">
    <div id="play-setup">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <h2 data-i18n="play_title"></h2>
      <div class="option-group">
        <label data-i18n="color"></label>
        <div class="seg" id="play-color">
          <button data-v="w" class="on" data-i18n="white"></button>
          <button data-v="b" data-i18n="black"></button>
          <button data-v="r" data-i18n="random"></button>
        </div>
      </div>
      <div class="option-group">
        <label data-i18n="level"></label>
        <div class="seg wrap" id="play-level"></div>
      </div>
      <button id="play-start" class="btn primary big" data-i18n="start_game"></button>
    </div>
    <div id="play-game" class="hidden">
      <div id="play-status" class="status-bar"></div>
      <div id="play-board" class="board-wrap"></div>
      <div class="row" id="play-actions">
        <button id="play-undo" class="btn" data-i18n="undo_move"></button>
        <button id="play-resign" class="btn danger">🏳️ <span data-i18n="resign"></span></button>
        <button id="play-new" class="btn" data-i18n="new_game"></button>
        <button id="play-analyze" class="btn" data-i18n="analyze_game"></button>
      </div>
      <div id="play-moves" class="movelist small"></div>
    </div>
  </section>

  <!-- ══════════ OPENING TRAINER ══════════ -->
  <section id="screen-trainer" class="screen hidden">
    <div id="trainer-setup">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <h2 data-i18n="trainer_title"></h2>
      <p class="hint" data-i18n="trainer_explain"></p>
      <div class="option-group">
        <label data-i18n="book_base"></label>
        <select id="trainer-base" class="input"></select>
        <div id="trainer-book-info" class="hint"></div>
      </div>
      <div class="option-group">
        <label data-i18n="color"></label>
        <div class="seg" id="trainer-color">
          <button data-v="w" class="on" data-i18n="white"></button>
          <button data-v="b" data-i18n="black"></button>
        </div>
      </div>
      <div class="option-group">
        <label data-i18n="level"></label>
        <div class="seg wrap" id="trainer-level"></div>
      </div>
      <button id="trainer-start" class="btn primary big" data-i18n="start_game"></button>
    </div>
    <div id="trainer-game" class="hidden">
      <div class="row" style="justify-content:flex-end; margin:0 0 6px;">
        <button id="trainer-new-btn" class="tool-btn" style="flex:0 0 auto; width:auto; padding:8px 14px;" data-i18n-aria="new_game">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
            <rect x="10.5" y="1" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
            <rect x="1" y="10.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="17.5" cy="17.5" r="6" fill="var(--accent)"/>
            <path d="M17.5 14.7v5.6M14.7 17.5h5.6" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="trainer-status" class="status-bar"></div>
      <div id="trainer-book-status" class="book-badge"></div>
      <div id="trainer-board" class="board-wrap"></div>
      <div id="trainer-toolbar" class="toolbar">
        <button id="trainer-first" class="tool-btn">⏮</button>
        <button id="trainer-prev" class="tool-btn">◀</button>
        <button id="trainer-next" class="tool-btn">▶</button>
        <button id="trainer-last" class="tool-btn">⏭</button>
        <button id="trainer-hint" class="tool-btn" data-i18n-aria="hint">🔎</button>
        <button id="trainer-resign" class="tool-btn" data-i18n-aria="resign">🏳️</button>
        <button id="trainer-analyze" class="tool-btn" data-i18n-aria="analyze_game">🔬</button>
      </div>
      <div id="trainer-moves" class="movelist small"></div>
    </div>
  </section>

  <!-- ══════════ PUZZLES ══════════ -->
  <section id="screen-puzzles" class="screen hidden">
    <div class="row screen-head">
      <h2 data-i18n="puzzles_title"></h2>
      <span id="puzzle-elo" class="elo-badge"></span>
    </div>
    <div class="row" style="justify-content:space-between">
      <span id="puzzle-progress" class="hint"></span>
      <span id="puzzle-timer" class="elo-badge"></span>
      <div class="row" style="margin:0; gap:6px;">
        <button id="puzzle-blind-open" class="btn" data-i18n="blind_open"></button>
        <button id="puzzle-rush-open" class="btn" data-i18n="rush_open"></button>
      </div>
    </div>
    <button id="puzzle-theme-btn" class="btn" data-i18n="select_theme"></button>
    <div id="puzzle-status" class="status-bar"></div>
    <div id="puzzle-board" class="board-wrap"></div>
    <div id="puzzle-nav" class="toolbar">
      <button id="puzzle-nav-first" class="tool-btn">⏮</button>
      <button id="puzzle-nav-prev" class="tool-btn">◀</button>
      <button id="puzzle-nav-next" class="tool-btn">▶</button>
      <button id="puzzle-nav-last" class="tool-btn">⏭</button>
    </div>
    <div class="row wrap" id="puzzle-actions">
      <button id="puzzle-hint" class="btn" data-i18n="hint"></button>
      <button id="puzzle-solution" class="btn" data-i18n="show_solution"></button>
      <button id="puzzle-share" class="btn">📤</button>
      <button id="puzzle-analyze" class="btn hidden" data-i18n="analyze_short"></button>
      <button id="puzzle-next" class="btn primary" data-i18n="next_puzzle"></button>
    </div>
  </section>

  <!-- ══════════ PUZZLE RUSH ══════════ -->
  <section id="screen-rush" class="screen hidden">
    <div id="rush-intro">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <div class="row screen-head">
        <button id="rush-back" class="btn" data-i18n="back"></button>
        <h2 data-i18n="rush_title"></h2>
      </div>
      <p class="hint" data-i18n="rush_explain"></p>
      <div class="row wrap profile-elo-row">
        <div class="elo-card"><span data-i18n="rush_best"></span><b id="rush-best-score"></b></div>
      </div>
      <div class="option-group">
        <label data-i18n="rush_duration"></label>
        <div class="seg" id="rush-duration">
          <button data-v="180" class="on">3 min</button>
          <button data-v="300">5 min</button>
        </div>
      </div>
      <button id="rush-start" class="btn primary big" data-i18n="rush_start"></button>
    </div>
    <div id="rush-game" class="hidden">
      <div class="row" style="justify-content:space-between">
        <span id="rush-timer" class="elo-badge"></span>
        <span id="rush-score" class="elo-badge"></span>
      </div>
      <div id="rush-board" class="board-wrap"></div>
      <div id="rush-status" class="status-bar"></div>
    </div>
    <div id="rush-result" class="hidden">
      <div class="profile-card" style="text-align:center">
        <h2 id="rush-result-title"></h2>
        <div style="font-size:48px; font-weight:700; color:var(--accent)" id="rush-result-score"></div>
        <p id="rush-result-best" class="hint"></p>
        <div class="row wrap" style="justify-content:center">
          <button id="rush-share" class="btn">📤</button>
          <button id="rush-again" class="btn primary" data-i18n="rush_start"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════ BLINDFOLD PUZZLES ══════════ -->
  <section id="screen-blind" class="screen hidden">
    <div class="row screen-head">
      <button id="blind-back" class="btn" data-i18n="back"></button>
      <h2 data-i18n="blind_title"></h2>
      <span id="blind-elo" class="elo-badge"></span>
    </div>
    <p class="hint" data-i18n="blind_explain"></p>
    <div id="blind-status" class="status-bar"></div>
    <div id="blind-turn" class="hint blind-turn"></div>
    <div id="blind-countdown" class="blind-countdown hidden"></div>
    <div id="blind-board" class="board-wrap"></div>
    <div class="row" id="blind-actions">
      <button id="blind-peek" class="btn"></button>
      <button id="blind-solution" class="btn" data-i18n="show_solution"></button>
      <button id="blind-share" class="btn hidden">📤</button>
      <button id="blind-next" class="btn primary" data-i18n="next_puzzle"></button>
    </div>
  </section>

  <!-- ══════════ ENDGAME ══════════ -->
  <section id="screen-endgame" class="screen hidden">
    <div id="endgame-list-view">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <div class="row screen-head">
        <h2 data-i18n="tab_endgame"></h2>
      </div>
      <div id="endgame-cat-list" class="list"></div>
    </div>
    <div id="endgame-positions-view" class="hidden">
      <div class="row screen-head">
        <button id="endgame-back-cat" class="btn" data-i18n="back"></button>
        <h2 id="endgame-cat-title"></h2>
      </div>
      <div id="endgame-pos-list" class="list"></div>
    </div>
    <div id="endgame-viewer-view" class="hidden">
      <div class="row screen-head">
        <button id="endgame-back-pos" class="btn" data-i18n="back"></button>
        <h2 id="endgame-pos-title" class="ellipsis"></h2>
      </div>
      <div id="endgame-board" class="board-wrap"></div>
      <div id="endgame-status" class="status-bar hidden"></div>
      <div class="row" id="endgame-study-actions">
        <button id="endgame-flip" class="tool-btn">🔄</button>
        <button id="endgame-engine-toggle" class="tool-btn">🖥️</button>
        <button id="endgame-practice-start" class="btn primary" data-i18n="practice_start"></button>
      </div>
      <div id="endgame-engine" class="engine-panel hidden">
        <div class="engine-lines" id="endgame-engine-lines"></div>
      </div>
      <p id="endgame-comment" class="hint"></p>
      <div class="row" id="endgame-practice-actions" style="display:none">
        <button id="endgame-undo" class="btn" data-i18n="undo_move"></button>
        <button id="endgame-resign" class="btn danger" data-i18n="resign"></button>
        <button id="endgame-share" class="btn hidden">📤</button>
      </div>
    </div>
  </section>

  <!-- ══════════ LEARN ══════════ -->
  <section id="screen-learn" class="screen hidden">
    <div id="learn-cat-view">
      <img src="icons/logo-mark.png" class="watermark" alt="">
      <div class="row screen-head">
        <h2 data-i18n="tab_learn"></h2>
      </div>
      <div id="learn-cat-list" class="list"></div>
    </div>
    <div id="learn-lesson-list-view" class="hidden">
      <div class="row screen-head">
        <button id="learn-back-cat" class="btn" data-i18n="back"></button>
        <h2 id="learn-cat-title"></h2>
      </div>
      <div id="learn-lesson-list" class="list"></div>
    </div>
    <div id="learn-lesson-view" class="hidden">
      <div class="row screen-head">
        <button id="learn-back-lessons" class="btn" data-i18n="back"></button>
        <h2 id="learn-lesson-title" class="ellipsis"></h2>
      </div>
      <div id="learn-board" class="board-wrap"></div>
      <div id="learn-demo-nav" class="row hidden" style="justify-content:center; align-items:center; gap:10px; margin:8px 0;">
        <button id="learn-demo-prev" class="tool-btn">◀</button>
        <button id="learn-demo-play" class="tool-btn">▶️</button>
        <span id="learn-demo-counter" class="hint" style="min-width:64px; text-align:center;"></span>
        <button id="learn-demo-next" class="tool-btn">▶</button>
      </div>
      <div id="learn-practice-status" class="status-bar hidden"></div>
      <p id="learn-lesson-text" class="hint learn-text"></p>
      <button id="learn-practice-btn" class="btn primary big hidden" data-i18n="learn_practice_btn"></button>
      <div class="row" id="learn-lesson-nav">
        <button id="learn-prev-lesson" class="btn">◀</button>
        <button id="learn-next-lesson" class="btn primary">▶</button>
      </div>
    </div>
  </section>

  <!-- ══════════ PROFILE ══════════ -->
  <section id="screen-profile" class="screen hidden">
    <div class="row screen-head">
      <h2 data-i18n="tab_profile"></h2>
      <button id="profile-leaderboard-btn" class="btn primary" data-i18n="leaderboard_btn"></button>
    </div>

    <div id="profile-account" class="profile-card">
      <div class="row" style="align-items:center; gap:12px;">
        <span class="avatar-edit-wrap">
          <span id="profile-avatar-wrap"></span>
          <button id="profile-edit-btn" class="avatar-edit-btn" data-i18n-aria="edit_profile">✏️</button>
        </span>
        <div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span id="profile-display-name" style="font-weight:700;"></span>
            <span id="profile-account-badge"></span>
          </div>
          <button id="profile-auth-btn" class="btn small" data-i18n="sign_in_or_up"></button>
          <button id="profile-signout-btn" class="btn small hidden" data-i18n="sign_out"></button>
        </div>
      </div>
    </div>

    <div class="profile-card member-card">
      <h3 style="margin:0 0 6px" data-i18n="member_card_title"></h3>
      <p id="profile-member-status" class="hint"></p>
      <button id="profile-member-btn" class="btn primary big"></button>
    </div>

    <div class="profile-card">
      <div class="row" style="justify-content:space-between; margin:0 0 8px; align-items:center;">
        <h3 style="margin:0" data-i18n="daily_missions_title"></h3>
        <span id="daily-missions-streak" class="hint"></span>
      </div>
      <div id="daily-missions-list" class="daily-missions-list"></div>
    </div>

    <div class="profile-card">
      <div class="row" style="justify-content:space-between; margin:0 0 8px; align-items:center;">
        <h3 style="margin:0" data-i18n="streak_progress"></h3>
        <button id="profile-share-streak" class="btn small" data-i18n="share_streak"></button>
      </div>
      <div id="profile-streak-timeline" class="streak-timeline"></div>
    </div>

    <div class="row wrap profile-elo-row">
      <button class="elo-card" id="profile-elo-puzzle-card"><span data-i18n="puzzle_elo"></span><b id="profile-elo-puzzle"></b></button>
      <button class="elo-card" id="profile-elo-opening-card"><span data-i18n="opening_elo"></span><b id="profile-elo-opening"></b></button>
      <button class="elo-card" id="profile-elo-endgame-card"><span data-i18n="endgame_elo"></span><b id="profile-elo-endgame"></b></button>
      <button class="elo-card" id="profile-elo-blindfold-card"><span data-i18n="blindfold_elo"></span><b id="profile-elo-blindfold"></b></button>
    </div>

    <div class="profile-card">
      <div class="row" style="justify-content:space-between; margin:0 0 8px;">
        <h3 style="margin:0" data-i18n="trophy_case"></h3>
        <span id="trophy-count" class="hint"></span>
      </div>
      <div id="trophy-case" class="trophy-grid"></div>
    </div>

    <div class="profile-card">
      <h3 data-i18n="radar_overall"></h3>
      <div class="radar-wrap"><canvas id="chart-overall"></canvas></div>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_opening"></h3>
      <div class="radar-wrap"><canvas id="chart-opening"></canvas></div>
      <p id="profile-opening-empty" class="hint hidden" data-i18n="no_opening_data"></p>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_puzzle"></h3>
      <div class="radar-wrap"><canvas id="chart-puzzle"></canvas></div>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_endgame"></h3>
      <div class="radar-wrap"><canvas id="chart-endgame"></canvas></div>
    </div>
  </section>

  <!-- ══════════ LEADERBOARD ══════════ -->
  <section id="screen-leaderboard" class="screen hidden">
    <div class="row screen-head">
      <button id="leaderboard-back" class="btn" data-i18n="back"></button>
      <h2 data-i18n="leaderboard_title"></h2>
    </div>
    <div class="seg" id="leaderboard-mode">
      <button data-v="puzzleElo" class="on" data-i18n="puzzle_elo"></button>
      <button data-v="rushBestScore" data-i18n="rush_title"></button>
      <button data-v="blindfoldElo" data-i18n="blindfold_elo"></button>
    </div>
    <input type="text" id="leaderboard-search" class="input" data-i18n-ph="search_player">
    <div id="leaderboard-status" class="hint"></div>
    <div id="leaderboard-list" class="list"></div>
  </section>

  <!-- ══════════ PUBLIC PROFILE ══════════ -->
  <section id="screen-public-profile" class="screen hidden">
    <div class="row screen-head">
      <button id="pubprofile-back" class="btn" data-i18n="back"></button>
      <h2 id="pubprofile-name"></h2>
    </div>
    <div class="row" style="justify-content:center; margin:6px 0 14px;">
      <span id="pubprofile-avatar-wrap"></span>
    </div>
    <div class="row wrap profile-elo-row">
      <div class="elo-card"><span data-i18n="puzzle_elo"></span><b id="pubprofile-elo-puzzle"></b></div>
      <div class="elo-card"><span data-i18n="opening_elo"></span><b id="pubprofile-elo-opening"></b></div>
      <div class="elo-card"><span data-i18n="endgame_elo"></span><b id="pubprofile-elo-endgame"></b></div>
      <div class="elo-card"><span data-i18n="blindfold_elo"></span><b id="pubprofile-elo-blindfold"></b></div>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_overall"></h3>
      <div class="radar-wrap"><canvas id="chart-pub-overall"></canvas></div>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_opening"></h3>
      <div class="radar-wrap"><canvas id="chart-pub-opening"></canvas></div>
      <p id="pubprofile-opening-empty" class="hint hidden" data-i18n="no_opening_data"></p>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_puzzle"></h3>
      <div class="radar-wrap"><canvas id="chart-pub-puzzle"></canvas></div>
    </div>
    <div class="profile-card">
      <h3 data-i18n="radar_endgame"></h3>
      <div class="radar-wrap"><canvas id="chart-pub-endgame"></canvas></div>
    </div>
  </section>

  <!-- ══════════ POSITION SETUP (overlay) ══════════ -->
  <section id="screen-setup" class="screen hidden">
    <div class="row screen-head">
      <h2 data-i18n="setup_position"></h2>
    </div>
    <div id="setup-board" class="board-wrap"></div>
    <div id="setup-palette" class="palette"></div>
    <div class="option-group row">
      <label data-i18n="side_to_move"></label>
      <div class="seg" id="setup-turn">
        <button data-v="w" class="on" data-i18n="white"></button>
        <button data-v="b" data-i18n="black"></button>
      </div>
    </div>
    <div class="option-group">
      <label data-i18n="castling"></label>
      <div class="row wrap castling-row">
        <label><input type="checkbox" id="cast-K"> ♔ O-O</label>
        <label><input type="checkbox" id="cast-Q"> ♔ O-O-O</label>
        <label><input type="checkbox" id="cast-k"> ♚ O-O</label>
        <label><input type="checkbox" id="cast-q"> ♚ O-O-O</label>
      </div>
    </div>
    <div class="row wrap">
      <button id="setup-start" class="btn" data-i18n="start_position"></button>
      <button id="setup-clear" class="btn" data-i18n="clear_board"></button>
    </div>
    <div class="row wrap">
      <button id="setup-analyze" class="btn primary" data-i18n="analyze_this"></button>
      <button id="setup-play" class="btn" data-i18n="play_from_here"></button>
      <button id="setup-cancel" class="btn" data-i18n="cancel"></button>
    </div>
  </section>
</main>

<nav id="tabbar">
  <button data-screen="analysis"><span class="tab-ico">🔍</span><span data-i18n="tab_analysis"></span></button>
  <button data-screen="base"><span class="tab-ico">📚</span><span data-i18n="tab_base"></span></button>
  <button data-screen="play"><span class="tab-ico">🤖</span><span data-i18n="tab_play"></span></button>
  <button data-screen="trainer"><span class="tab-ico">📖</span><span data-i18n="tab_trainer"></span></button>
  <button data-screen="puzzles"><span class="tab-ico">🧩</span><span data-i18n="tab_puzzles"></span></button>
  <button data-screen="endgame"><span class="tab-ico">🏁</span><span data-i18n="tab_endgame"></span></button>
  <button data-screen="learn"><span class="tab-ico">🎓</span><span data-i18n="tab_learn"></span></button>
  <button data-screen="profile"><span class="tab-ico">👤</span><span data-i18n="tab_profile"></span></button>
</nav>

<div id="toast" class="hidden"></div>
<div id="modal-root"></div>

<div id="kael-corner">
  <div id="kael-bubble" class="kael-quote-bubble"></div>
  <button id="kael-fab" data-i18n-aria="kael_fab_hint"><img src="icons/kael/kael-bust.png" alt="Kael"></button>
</div>

<script src="vendor/chart.umd.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
